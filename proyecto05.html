    <style>
        /* Estilos para el carrusel horizontal */
        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            padding: 2rem 0;
        }
        
        .carousel-track {
            display: flex;
            gap: 1.5rem;
            animation: scroll 40s linear infinite;
            width: fit-content;
        }
        
        .carousel-track:hover {
            animation-play-state: paused;
        }
        
        .carousel-item {
            flex: 0 0 300px;
            height: 400px;
            position: relative;
            border-radius: 1rem;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        
        .carousel-item:hover {
            transform: scale(1.05) translateY(-10px);
            z-index: 10;
        }
        
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .carousel-item .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 1rem 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        
        .carousel-item:hover .caption {
            transform: translateY(0);
        }
        
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-300px * 7 - 1.5rem * 6)); }
        }
        
        /* Segunda fila (dirección inversa) */
        .carousel-track.reverse {
            animation: scroll-reverse 45s linear infinite;
        }
        
        @keyframes scroll-reverse {
            0% { transform: translateX(calc(-300px * 7 - 1.5rem * 6)); }
            100% { transform: translateX(0); }
        }
        
        /* Modal para vista expandida */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
        }
        
        .modal-content img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 0.5rem;
        }
        
        .modal-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: white;
            cursor: pointer;
            z-index: 101;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .modal-close:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }
        
        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            cursor: pointer;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 101;
        }
        
        .modal-nav:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-50%) scale(1.1);
        }
        
        .modal-nav.prev {
            left: 2rem;
        }
        
        .modal-nav.next {
            right: 2rem;
        }
        
        .modal-counter {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 0.875rem;
            z-index: 101;
        }
        
        /* Thumbnail strip */
        .thumbnails {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        
        .thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 0.25rem;
            overflow: hidden;
            cursor: pointer;
            opacity: 0.5;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .thumbnail:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .thumbnail.active {
            opacity: 1;
            border-color: white;
            transform: scale(1.1);
        }
        
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

    <script src="./assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // Lista de imágenes en orden
            const images = [
                { file: 'inicial.jpg', name: 'Inicial' },
                { file: '1.jpg', name: '01' },
                { file: '2.jpg', name: '02' },
                { file: '3.jpg', name: '03' },
                { file: '4.jpg', name: '04' },
                { file: '5.jpg', name: '05' },
                { file: '6.jpg', name: '06' }
            ];
            
            const basePath = '/assets/img/trabajo05/';
            const carousel1 = document.getElementById('carousel1');
            const carousel2 = document.getElementById('carousel2');
            const thumbnails = document.getElementById('thumbnails');
            
            // Variables para el modal
            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modalImage');
            const modalClose = document.getElementById('modalClose');
            const modalPrev = document.getElementById('modalPrev');
            const modalNext = document.getElementById('modalNext');
            const modalCounter = document.getElementById('modalCounter');
            let currentImageIndex = 0;
            
            // Función para crear un item del carrusel
            function createCarouselItem(image, index) {
                const div = document.createElement('div');
                div.className = 'carousel-item';
                div.innerHTML = `
                    <img src="${basePath}${image.file}" alt="${image.name}" loading="lazy">
                    <div class="caption">
                        <span class="text-sm uppercase tracking-wider">${image.name}</span>
                    </div>
                `;
                div.addEventListener('click', () => openModal(index));
                return div;
            }
            
            // Llenar carrusel 1 (con duplicados para efecto infinito)
            for (let i = 0; i < 3; i++) { // Duplicar 3 veces para efecto suave
                images.forEach((image, index) => {
                    carousel1.appendChild(createCarouselItem(image, index));
                });
            }
            
            // Llenar carrusel 2 (sentido inverso, también duplicado)
            for (let i = 0; i < 3; i++) {
                [...images].reverse().forEach((image, index) => {
                    // Para el índice real necesitamos la posición original
                    const originalIndex = images.length - 1 - index;
                    carousel2.appendChild(createCarouselItem(image, originalIndex));
                });
            }
            
            // Crear miniaturas
            images.forEach((image, index) => {
                const thumb = document.createElement('div');
                thumb.className = `thumbnail ${index === 0 ? 'active' : ''}`;
                thumb.innerHTML = `<img src="${basePath}${image.file}" alt="${image.name}">`;
                thumb.addEventListener('click', () => openModal(index));
                thumbnails.appendChild(thumb);
            });
            
            // Función para abrir modal
            function openModal(index) {
                currentImageIndex = index;
                updateModalImage();
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
                
                // Actualizar miniaturas activas
                document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                    if (i === index) {
                        thumb.classList.add('active');
                    } else {
                        thumb.classList.remove('active');
                    }
                });
            }
            
            // Actualizar imagen del modal
            function updateModalImage() {
                const image = images[currentImageIndex];
                modalImage.src = `${basePath}${image.file}`;
                modalCounter.textContent = `${image.name} · ${currentImageIndex + 1}/${images.length}`;
            }
            
            // Navegación del modal
            function nextImage() {
                currentImageIndex = (currentImageIndex + 1) % images.length;
                updateModalImage();
                
                // Actualizar miniaturas
                document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                    if (i === currentImageIndex) {
                        thumb.classList.add('active');
                    } else {
                        thumb.classList.remove('active');
                    }
                });
            }
            
            function prevImage() {
                currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
                updateModalImage();
                
                // Actualizar miniaturas
                document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                    if (i === currentImageIndex) {
                        thumb.classList.add('active');
                    } else {
                        thumb.classList.remove('active');
                    }
                });
            }
            
            // Event listeners del modal
            modalClose.addEventListener('click', () => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            });
            
            modalNext.addEventListener('click', nextImage);
            modalPrev.addEventListener('click', prevImage);
            
            // Cerrar modal con ESC
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    modal.classList.remove('active');
                    document.body.style.overflow = '';
                }
                
                if (modal.classList.contains('active')) {
                    if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        nextImage();
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        prevImage();
                    }
                }
            });
            
            // Cerrar modal haciendo clic fuera de la imagen
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
            
        });
    </script>
</body>
