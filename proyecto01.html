<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto 01 · Hugo Díaz</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Inter']">

    <!-- MENÚ OVERLAY (igual) -->
    <div id="menuOverlay" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-700">
        <div class="text-center">
            <nav class="space-y-8 md:space-y-12">
                <a href="index.html" class="block text-5xl md:text-7xl lg:text-8xl font-black hover:text-gray-400 transition-colors duration-300 tracking-tighter">INICIO</a>
                <a href="proyectos.html" class="block text-5xl md:text-7xl lg:text-8xl font-black hover:text-gray-400 transition-colors duration-300 tracking-tighter">PROYECTOS</a>
                <a href="index.html#about" class="block text-5xl md:text-7xl lg:text-8xl font-black hover:text-gray-400 transition-colors duration-300 tracking-tighter">SOBRE MI</a>
                <a href="index.html#contact" class="block text-5xl md:text-7xl lg:text-8xl font-black hover:text-gray-400 transition-colors duration-300 tracking-tighter">CONTACTO</a>
            </nav>
            <button id="closeMenu" class="absolute top-8 right-8 text-white hover:text-gray-400 transition-colors">
                <svg class="w-10 h-10 md:w-14 md:h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- HEADER -->
    <header class="fixed top-0 left-0 right-0 z-40 mix-blend-difference">
        <div class="container mx-auto px-6 py-6 flex justify-between items-center">
            <button id="menuToggle" class="text-white hover:opacity-60 transition-opacity">
                <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <span class="text-xs md:text-sm uppercase tracking-[0.3em] font-bold text-white">HUGO DÍAZ</span>
            <div class="w-6 md:w-8"></div>
        </div>
    </header>

    <!-- CONTENIDO DEL PROYECTO -->
    <main class="pt-32 pb-24">
        <div class="container mx-auto px-4">
            
            <!-- Cabecera del proyecto -->
            <div class="mb-16">
                <a href="proyectos.html" class="text-zinc-400 hover:text-white transition-colors flex items-center gap-2 mb-8">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    <span class="uppercase tracking-wider text-sm">Volver a proyectos</span>
                </a>
                
                <h1 class="text-7xl md:text-9xl font-black tracking-tighter">PROYECTO 01</h1>
                <p class="text-xl text-zinc-400 mt-4">_sinTitulo_ · 2025</p>
            </div>
            
            
            <!-- GALERÍA COMPLETA DEL PROYECTO -->
            <div class="space-y-8">
                <!-- Imagen 1 (grande) -->
                <div class="w-full">
                    <img src="./assets/img/trabajo01/inicial.jpg" 
                         alt="Proyecto 01 - Imagen 1" 
                         class="w-full h-auto object-cover rounded-lg">
                </div>
                
                <!-- Grid de 2 imágenes -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <img src="./assets/img/trabajo01/3.jpg" 
                         alt="Proyecto 01 - Imagen 2" 
                         class="w-full h-auto object-cover rounded-lg">
                    <img src="./assets/img/trabajo01/1.jpg" 
                         alt="Proyecto 01 - Imagen 3" 
                         class="w-full h-auto object-cover rounded-lg">
                </div>
                
                <!-- Imagen 4 (si existe) -->
                <img src="./assets/img/trabajo01/3.jpg" 
                     alt="Proyecto 01 - Imagen 4" 
                     class="w-full h-auto object-cover rounded-lg">
            </div>
            
            <!-- Navegación entre proyectos -->
            <div class="flex justify-between mt-24 pt-8 border-t border-zinc-800">
                
                <a href="proyecto02.html" class="text-white/60 hover:text-white transition-colors flex items-center gap-2">
                    <span class="uppercase tracking-wider text-sm">Siguiente</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-black border-t border-zinc-800 py-8">
        <div class="container mx-auto px-4 text-center text-zinc-500 text-sm">
            © 2026 HUGO DÍAZ · TODOS LOS DERECHOS RESERVADOS
        </div>
    </footer>

    <script src="./assets/js/main.js"></script>
</body>
</html>
