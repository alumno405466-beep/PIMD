    <style>
        /* Masonry Grid */
        .masonry-grid {
            column-count: 1;
            column-gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        @media (min-width: 640px) {
            .masonry-grid {
                column-count: 2;
            }
        }
        
        @media (min-width: 1024px) {
            .masonry-grid {
                column-count: 3;
            }
        }
        
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            position: relative;
            border-radius: 0.5rem;
            overflow: hidden;
            background: #111;
            transition: transform 0.3s ease;
        }
        
        .masonry-item:hover {
            transform: scale(1.02);
            z-index: 10;
        }
        
        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 0.5rem;
        }
        
        .masonry-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 1rem 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .masonry-item:hover .masonry-caption {
            opacity: 1;
        }
        
        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-content {
            max-width: 95vw;
            max-height: 95vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content img {
            max-width: 100%;
            max-height: 95vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 0.25rem;
        }
        
        .modal-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 101;
        }
        
        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 101;
        }
        
        .modal-nav.prev {
            left: 2rem;
        }
        
        .modal-nav.next {
            right: 2rem;
        }
        
        /* Info de resolución (opcional) */
        .image-info {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(0,0,0,0.7);
            color: #a1a1aa;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.7rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .masonry-item:hover .image-info {
            opacity: 1;
        }
    </style>
</head>

            </svg>
        </button>
        
        <div class="modal-content">
            <img src="" alt="Imagen ampliada" id="modalImage">
        </div>
        
        <div id="modalCounter" class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-black/50 backdrop-blur-sm px-4 py-2 rounded-full text-sm border border-white/10"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // Lista de imágenes con sus resoluciones (opcional)
            const images = [
                { file: 'inicial.jpg', name: 'INICIAL', resolution: '?' },
                { file: '1.jpg', name: '01', resolution: '?' },
                { file: '2.jpg', name: '02', resolution: '?' },
                { file: '3.jpg', name: '03', resolution: '?' },
                { file: '4.jpg', name: '04', resolution: '?' }
            ];
            
            const basePath = '/assets/img/trabajo06/';
            const grid = document.getElementById('masonryGrid');
            
            // Modal variables
            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modalImage');
            const modalClose = document.getElementById('modalClose');
            const modalPrev = document.getElementById('modalPrev');
            const modalNext = document.getElementById('modalNext');
            const modalCounter = document.getElementById('modalCounter');
            let currentIndex = 0;
            
            // Crear items del masonry
            images.forEach((image, index) => {
                const item = document.createElement('div');
                item.className = 'masonry-item';
                
                const img = document.createElement('img');
                img.src = `${basePath}${image.file}`;
                img.alt = image.name;
                img.loading = 'lazy';
                
                // Caption
                const caption = document.createElement('div');
                caption.className = 'masonry-caption';
                caption.innerHTML = `
                    <span class="text-lg font-bold">${image.name}</span>
                    <span class="text-sm text-zinc-300 block mt-1">${image.resolution}</span>
                `;
                
                item.appendChild(img);
                item.appendChild(caption);
                
                // Abrir modal al hacer clic
                item.addEventListener('click', () => openModal(index));
                
                grid.appendChild(item);
            });
            
            // Funciones modal (igual que antes)
            function openModal(index) {
                currentIndex = index;
                updateModalImage();
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
            
            function updateModalImage() {
                const image = images[currentIndex];
                modalImage.src = `${basePath}${image.file}`;
                modalCounter.textContent = `${image.name} · ${currentIndex + 1}/${images.length}`;
            }
            
            function nextImage() {
                currentIndex = (currentIndex + 1) % images.length;
                updateModalImage();
            }
            
            function prevImage() {
                currentIndex = (currentIndex - 1 + images.length) % images.length;
                updateModalImage();
            }
            
            modalClose.addEventListener('click', () => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            });
            
            modalNext.addEventListener('click', nextImage);
            modalPrev.addEventListener('click', prevImage);
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    modal.classList.remove('active');
                    document.body.style.overflow = '';
                }
                if (modal.classList.contains('active')) {
                    if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        nextImage();
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        prevImage();
                    }
                }
            });
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
        });
    </script>
